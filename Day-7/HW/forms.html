<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Registration Form</title>
	<link rel="stylesheet" href="formsdesign.css">
</head>
<body>
	<main class="page">
		<section class="intro">
			<p class="question">Q3) Working with forms & GUI.</p>
			<p>Design a HTML page like the image below using HTML5 and apply your styles using CSS or Bootstrap.</p>
		</section>

		<section class="form-wrap">
			<table class="form-table">
				<thead>
					<tr>
						<th colspan="2">Registration Form</th>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td>Student Name</td>
						<td><input type="text"></td>
					</tr>
					<tr>
						<td>Father's Name</td>
						<td><input type="text"></td>
					</tr>
					<tr>
						<td>Mother's Name</td>
						<td><input type="text"></td>
					</tr>
					<tr>
						<td>Date of Birth</td>
						<td><input type="date"></td>
					</tr>
					<tr>
						<td>Gender</td>
						<td class="inline-options">
							<label><input type="radio" name="gender"> Male</label>
							<label><input type="radio" name="gender"> Female</label>
						</td>
					</tr>
					<tr>
						<td>Email ID</td>
						<td><input type="email"></td>
					</tr>
					<tr>
						<td>Mobile No.</td>
						<td><input type="tel"></td>
					</tr>
					<tr>
						<td>Address</td>
						<td><textarea rows="4"></textarea></td>
					</tr>
					<tr>
						<td>State</td>
						<td><input type="text"></td>
					</tr>
					<tr>
						<td>City</td>
						<td><input type="text"></td>
					</tr>
					<tr>
						<td></td>
						<td><button type="submit">Submit</button></td>
					</tr>
				</tbody>
			</table>
		</section>
	</main>
</body>
</html>
