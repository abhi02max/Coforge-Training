<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Bootstrap Layout</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="BootDesign.css">
</head>
<body>
	<main class="container py-5">
		<section class="mb-5">
			<p class="text-uppercase text-primary fw-bold mb-2">Q4) Working with the Bootstrap Grid System.</p>
			<h1 class="display-5 fw-bold mb-3">Design a clean grid layout</h1>
			<p class="lead text-secondary">This page mirrors the assignment image using Bootstrap’s grid, spacing, and utility classes.</p>
		</section>

		<section class="hero-panel text-center text-white mb-4">
			<h2 class="fw-bold mb-0">Header</h2>
		</section>

		<section class="row g-4 mb-4">
			<div class="col-12 col-lg-4">
				<div class="tile tile-green h-100 d-flex align-items-center justify-content-center">
					<h3 class="m-0 fw-bold">Column 1</h3>
				</div>
			</div>
			<div class="col-12 col-lg-4">
				<div class="tile tile-orange h-100 d-flex align-items-center justify-content-center">
					<h3 class="m-0 fw-bold">Column 2</h3>
				</div>
			</div>
			<div class="col-12 col-lg-4">
				<div class="tile tile-yellow h-100 d-flex align-items-center justify-content-center">
					<h3 class="m-0 fw-bold">Column 3</h3>
				</div>
			</div>
		</section>

		<section class="footer-panel text-center text-dark fw-bold">
			Footer
		</section>
	</main>
</body>
</html>
