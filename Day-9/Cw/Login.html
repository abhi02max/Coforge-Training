<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Login Page</title>

<!--  External CSS -->
<link href="LoginStyle.css" rel="stylesheet">
 
</head>
<body>
<form action="LoginServlet" method="post"> <!-- LoginServlet is the url pattern and not the name of servlet. -->
	<div class="Logindiv">
		<table>
			<tr>
				<td>Username:</td>
				<td><input type="text" name="username"></td>
			</tr>
			<tr>
				<td>Password:</td>
				<td><input type="password" name="password"></td>
			</tr>
			<tr> 
				<td colspan="2" , align="center"><input type="Submit"
					, value="Login" class="LoginButton"></td>
			</tr>
		</table>
	</div>
</form>
</body>
</html>
