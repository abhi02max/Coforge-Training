<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>JavascriptES6</title>

<script type="text/javascript">

function add(a = 10, b = 20){
	console.log(a + b);
}

add();
add(20,30);
add(50);

function addition(a ,b, ...args){
	console.log(a+b);
	let total = 0;
	for(let n of args) {
		total = total + n;
	}
	console.log(total);
}

addition(100, 200, 10, 20, 30);

const odd = [1, 3, 5];
const combined = [2, 4, 6, ...odd];
console.log(combined);

let arr = [10, 20, 30, 40, 50];
let [x, y, z]=arr;
console.log(x);
console.log(y);
console.log(z);
let [a, b, c, ...args]=arr;
console.log(args);

let person = {
		firstName : "Harshika",
		lastName : "Davala"
}
let{firstName:fname, lastName:lname}=person;
console.log(fname,lname);

const arrowadd = (a,b)=>a+b;
function myFunction(){
console.log(arrowadd(10,60));
}

</script>

</head>
<body onload="myFunction()">
<h4>Javascript ES6 features<br> open console to check the outputs.</h4>
</body>
</html>
